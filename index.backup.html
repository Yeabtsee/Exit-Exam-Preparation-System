<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Welcome Page</title>
    <style>
      /* Global styles */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e6f2ff, #cce0ff);
        color: #333;
        margin: 0;
        display: flex;
        flex-direction: column; /* stack card and form vertically */
        gap: 15px;
        align-items: center;
        min-height: 100vh;
        
      }

      /* Card container (welcome) */
      .card {
        background: #fff;
        max-width: 600px;
        width: 90%;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        margin-top: 2rem; /* spacing from top */
      }

      .card header {
        background: #005b8c;
        color: #fff;
        padding: 1rem;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
      }

      .card h1 {
        margin: 0.5rem 0 1rem;
        font-size: 2rem;
      }

      /* Login card */
      .login-card {
        background: #fff;
        max-width: 400px;
        width: 90%;
        padding: 2rem;
        border-radius: 10px; /* reduced radius for smooth effect */
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        margin-bottom: 2rem; /* spacing from bottom */
        corner-shape: superellipse(
          30
        ); /* CSS property for iPhone-like corners */
        corner-radius: 300px; /* sets the actual rounded radius value */
      }

      .login-card h2 {
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }

      .login-card input[type="email"],
      .login-card input[type="password"] {
        width: 80%;
        padding: 0.75rem;
        margin: 0.5rem 0;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      .login-card button {
        background: #005b8c;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
      }

      .login-card button:hover {
        background: #004d73;
      }
      li {
        list-style: none;
      }
      .submit {
        margin-block: 20px;
        margin-bottom: 50px;
        font-weight: 400;
        background-color: #fff;
        padding-inline: 20px;
        padding-block: 10px;
        font-size: 18px;
        border-radius: 8px;
        user-select: none;
      }
      .incorrect.marked:checked::before {
        content: "";
        width: 4px;
        height: 13px;
        background-color: red;
        display: flex;
        border-radius: 1px;
        z-index: -1;
        position: relative;
        top: 0px;
        left: -8px;
      }
      .correct.marked:not(:checked)::before {
        content: "";
        width: 4px;
        height: 13px;
        background-color: green;
        display: flex;
        border-radius: 1px;
        z-index: -1;
        position: relative;
        top: 0px;
        left: -8px;
      }
      body {
        padding-inline: 15px;
      }


      .exams{
          font-size: 24px;
          border-radius: 8px;
          padding-block: 4px;
          padding-inline: 8px;
          background-color: #fff;
      }

      .score-board{

        
        display: flex;
        font-size: 18px;
        padding: 8px;
        margin-bottom: 40px;
        
      }
      .incorrect-container{


        
      }
      .correct-container{
        margin-right: auto;
      }
    </style>

function getLineColumnFromError(str, e) {
  // JSON.parse error usually contains "position X"
  const match = e.message.match(/position (\d+)/);
  if (!match) return null;

  const pos = Number(match[1]); // char index
  const lines = str.split(/\r?\n/);

  let current = 0;
  for (let i = 0; i < lines.length; i++) {
    const lineLength = lines[i].length + 1; // +1 for \n
    if (pos < current + lineLength) {
      return {
        line: i + 1, // 1-based
        column: pos - current + 1 // 1-based
      };
    }
    current += lineLength;
  }

  return null;
}

function getErrorContext(str, line, column, context = 50) {
  const lines = str.split(/\r?\n/); // split into lines
  if (line > lines.length) return null;

  const errorLine = lines[line - 1];
  const start = Math.max(0, column - 1 - context);
  const end = Math.min(errorLine.length, column - 1 + context);

  return errorLine.slice(start, end);
}

      function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
